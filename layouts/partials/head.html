<head>
    <meta charset="utf-8">

    <meta name="viewport"
      content="width=device-width, initial-scale=1">

    <meta name="description"
      content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

    <meta name="author"
      content="{{ .Site.Params.author }}">

    <meta property="og:title"
      content="{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.tagline }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}">

    <meta property="og:description"
      content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

    <meta property="og:type"
      content="{{ if .IsHome }}website{{ else }}article{{ end }}">

    <meta property="og:url"
      content="{{ .Permalink }}">

    <meta property="og:site_name" content="{{ .Site.Title }}">

    <meta property="og:locale" content="en_IN">

    <meta name="twitter:card" content="summary_large_image">

    <meta name="twitter:title"
      content="{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.tagline }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}">

    <meta name="twitter:description"
      content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

    <meta name="theme-color" content="#F8F5EF">
    
    <title>
        {{ if .IsHome }}
        {{ .Site.Title }} — {{ .Site.Params.tagline }}
        {{ else }}
        {{ .Title }} — {{ .Site.Title }}
        {{ end }}
    </title>
   
    <link rel="canonical" href="{{ .Permalink }}">

    <style>


    </style>

</head>
