<template id="search-result-template">

<article class="search-result">

    <h2 class="search-result__title">

        <a class="search-result__link"></a>

    </h2>

    <div class="search-result__meta">

        <span class="search-result__type"></span>

        <span class="search-result__separator"> · </span>

        <span class="search-result__reading-time"></span>

    </div>

    <p class="search-result__description"></p>

    <div class="search-result__match">

        <span class="search-result__match-label">

            Found in text

        </span>

        <p class="search-result__excerpt"></p>

    </div>

</article>

</template>
