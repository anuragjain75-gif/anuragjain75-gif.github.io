{{ $hero := .Resources.GetMatch "hero.*" }}

{{ with $hero }}

<div class="essay-card__media">

    <a class="essay-card__image" href="{{ $.RelPermalink }}">

        <img src="{{ .RelPermalink }}" alt="{{ $.Title }}">

    </a>

    {{ with $.Params.themes }}

    <div class="essay-card__themes">

        {{ range $index, $theme := . }}
        {{ if gt $index 0 }} · {{ end }}{{ $theme }}
        {{ end }}

    </div>

    {{ end }}

</div>

{{ end }}
