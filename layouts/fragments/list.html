{{ define "main" }}

<header class="page-header fragments-header">

    <h1>{{ .Title }}</h1>

    {{ with .Description }}
    <p class="page-description">{{ . }}</p>
    {{ end }}

    {{ partial "search.html" . }}

    {{ partial "fragment-theme-navigation.html" . }}

</header>

<section class="fragments-list">

    {{ range .RegularPages.ByDate.Reverse }}

    {{ partial "fragment-card.html" . }}

    {{ end }}
</section>

{{ end }}
