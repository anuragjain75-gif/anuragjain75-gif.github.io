{{ define "main" }}

{{ if eq .Section "essays" }}

<main class="essay">

    <header class="essay-header">

        <h1 class="essay-title">
            {{ .Title }}
        </h1>

        <div class="essay-meta">
            <time>{{ .Date.Format "2 January 2006" }}</time>
            <span> · </span>
            <span>{{ .ReadingTime }} min read</span>
        </div>

    </header>

    {{ with .Params.image }}

    <figure class="essay-hero">

        <img
            src="{{ . | relURL }}"
            alt="{{ $.Title }}">

    </figure>

    {{ end }}

    <article class="essay-content">

        {{ .Content }}

    </article>

</main>

{{ else }}

<main class="page">

    <h1 class="page-title">
        {{ .Title }}
    </h1>

    <article class="page-content">

        {{ .Content }}

    </article>

</main>

{{ end }}

{{ end }}
