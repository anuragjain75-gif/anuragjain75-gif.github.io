<!DOCTYPE html>
<html lang="en">



<head>
    <meta charset="utf-8">

    <meta name="viewport"
      content="width=device-width, initial-scale=1">

    <meta name="description"
      content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

    <meta name="author"
      content="{{ .Site.Params.author }}">

    <meta property="og:title"
      content="{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.tagline }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}">

    <meta property="og:description"
      content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

    <meta property="og:type"
      content="{{ if .IsHome }}website{{ else }}article{{ end }}">

    <meta property="og:url"
      content="{{ .Permalink }}">

    <meta property="og:site_name" content="{{ .Site.Title }}">

    <meta property="og:locale" content="en_IN">

    <meta name="twitter:card" content="summary_large_image">

    <meta name="twitter:title"
      content="{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.tagline }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}">

    <meta name="twitter:description"
      content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

    <meta name="theme-color" content="#F8F5EF">
    
    <title>
        {{ if .IsHome }}
        {{ .Site.Title }} — {{ .Site.Params.tagline }}
        {{ else }}
        {{ .Title }} — {{ .Site.Title }}
        {{ end }}
    </title>

    <link rel="canonical" href="{{ .Permalink }}">

    <style>

    body{
        max-width:760px;
        margin:auto;
        padding:60px 30px;
        font-family: Georgia, serif;
        line-height:1.8;
        color:#3C3A36;
        background:#F8F5EF;
    }

    header{
        text-align:center;
        margin-bottom:70px;
    }

    h1{
    font-size:2.7rem;
    font-weight:normal;
    line-height:1.15;
    margin:0;

    }

  .tagline{
    font-style:italic;
    color:#666;
    margin-top:10px;
    margin-bottom:40px;

    }

    nav{
        margin-top:40px;
    }

    nav a{
        margin:0 15px;
        color:#6E7451;
        text-decoration:none;
    }

.hero-image {
    width: 100%;
    margin: 60px 0 70px;
}

.hero-image img {
    width: 100%;
    height: auto;
    display: block;
    filter: brightness(80%);
}

.about-image {
    text-align: center;
    margin: 50px 0;
}

.about-image img {
    width: 280px;
    max-width: 100%;
    height: auto;
    border-radius: 6px;
}

main img {
    display: block;
    margin: 50px auto;
    max-width: 750px;   /* Adjust to taste */
    width: 100%;
    height: auto;
}

.site-emblem {
    text-align: center;
    margin-bottom: 0px;
}

.site-emblem img {
    width: 120px;
    height: auto;
    display: block;
    margin-bottom: -25px;
}

    </style>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-34TCWQ0NGL"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-34TCWQ0NGL');
</script>

<script type="text/javascript">
(function(c,l,a,r,i,t,y){
    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
})(window, document, "clarity", "script", "xgm7v5hnh4");
</script>

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">

</head>

<body>

<header>

<div class="site-emblem">
    <img src="/images/tree-logo.png" alt="Lilamaya emblem">
</div>

<h1>{{ .Site.Title }}</h1>

<p class="tagline">
{{ .Site.Params.tagline }}

</p>

<nav>

<a href="{{ "/" | relURL }}">Home</a>

<a href="{{ "essays/" | relURL }}">Essays</a>

<a href="{{ "fragments/" | relURL }}">Fragments</a>

<a href="{{ "books/" | relURL }}">Books</a>

<a href="{{ "about/" | relURL }}">About</a>

</nav>

</header>

{{ block "main" . }}{{ end }}

</body>

</html>
