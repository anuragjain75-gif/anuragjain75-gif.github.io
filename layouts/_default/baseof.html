<!DOCTYPE html>
<html lang="en">



<head>
    <meta charset="utf-8">
    <title>{{ .Site.Title }}</title>

    <style>

    body{
        max-width:760px;
        margin:auto;
        padding:60px 30px;
        font-family: Georgia, serif;
        line-height:1.8;
        color:#3C3A36;
        background:#F8F5EF;
    }

    header{
        text-align:center;
        margin-bottom:70px;
    }

    h1{
        margin-bottom:8px;
    }

    .tagline{
        font-style:italic;
        color:#666;
    }

    nav{
        margin-top:40px;
    }

    nav a{
        margin:0 15px;
        color:#6E7451;
        text-decoration:none;
    }

.hero-image {
    width: 100%;
    margin: 60px 0 70px;
}

.hero-image img {
    width: 100%;
    height: auto;
    display: block;
}

.about-image {
    text-align: center;
    margin: 50px 0;
}

.about-image img {
    width: 280px;
    max-width: 100%;
    height: auto;
    border-radius: 6px;
}

main img {
    display: block;
    margin: 50px auto;
    max-width: 750px;   /* Adjust to taste */
    width: 100%;
    height: auto;
}
    </style>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-34TCWQ0NGL"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-34TCWQ0NGL');
</script>

</head>

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">

<body>

<header>

<h1 class="site-title">
    <img src="/images/tree-logo.png" alt="Lilamaya Logo">
    <span>{{ .Site.Title }}</span>
</h1>

<p class="tagline">
{{ .Site.Params.tagline }}
</p>

<nav>

<a href="{{ "/" | relURL }}">Home</a>

<a href="{{ "essays/" | relURL }}">Essays</a>

<a href="{{ "books/" | relURL }}">Books</a>

<a href="{{ "fragments/" | relURL }}">Fragments</a>

<a href="{{ "about/" | relURL }}">About</a>

</nav>

</header>

{{ block "main" . }}{{ end }}

</body>

</html>
