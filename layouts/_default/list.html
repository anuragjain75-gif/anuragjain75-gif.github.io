{{ define "main" }}

<div class="container page-container">

    <header class="page-header">
        <h1>{{ .Title }}</h1>
    </header>

    {{ with .Content }}
        <div class="page-content">
            {{ . }}
        </div>
    {{ end }}

    {{ if .Pages }}
        <div class="page-list">
            {{ range .Pages.ByDate.Reverse }}
                <article class="page-summary">
                    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>

                    {{ with .Summary }}
                        <p>{{ . }}</p>
                    {{ end }}
                </article>
            {{ end }}
        </div>
    {{ end }}

</div>

{{ end }}
